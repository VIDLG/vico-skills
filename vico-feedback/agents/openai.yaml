interface:
  display_name: "Vico Feedback"
  short_description: "Draft and optionally file GitHub issues for vico-skills"
  default_prompt: "Turn user feedback about vico-skills into a structured GitHub issue draft. Ask only the shortest clarifying question needed, check likely duplicates when useful, and only create the issue after explicit user confirmation. Think before filing: separate workflow feedback from unrelated repository bugs, preserve the user's actual complaint without over-interpreting it, and prefer the smallest accurate draft that captures why the issue matters."
