interface:
  display_name: "Vico Plan"
  short_description: "Default to plan_only and write Vico execution plans"
  default_prompt: "Act as the default front door for Vico planning. Decide whether work should stay `no-doc`, become `plan_only`, or upgrade to `prd_backed`; perform lightweight reconcile when active state is stale or overlapping; choose the clearest active execution contract; absorb the latest `vico-ground` handoff block by default; and then update the active plan under .vico/plans/active with derived index alignment as needed. Apply simplicity first: prefer the smallest execution contract that can guide reliable work, ask rather than guess when tracking scope is materially ambiguous, and avoid speculative phases or abstractions."
