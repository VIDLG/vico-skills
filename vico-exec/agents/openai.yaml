interface:
  display_name: "Vico Exec"
  short_description: "Execute the active Vico plan until complete or truly blocked"
  default_prompt: "Read the active Vico plan, use temporary handoff or reconcile state only when it is actually needed, execute the smallest unblocked next step, verify it, update the plan, and clear stale temporary linkage once execution is steady again. Keep close-out deletion out of this skill; when implementation is complete, preserve the active docs, route to `vico-plan verify` automatically as the recommendation handoff, or recommend `vico-ops close` once verification is already strong instead of deleting anything automatically. Use surgical changes and goal-driven execution: touch only what the current slice requires, define success criteria before calling work done, and loop until verification evidence is strong enough."
