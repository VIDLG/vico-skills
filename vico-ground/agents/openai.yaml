interface:
  display_name: "Vico Ground"
  short_description: "Build shared ground before planning or execution"
  default_prompt: "Build just enough shared ground to choose a safe next route. Keep the public interface small: prefer `scan`, `clarify`, `stress`, or `handoff`; stop grounding once the next route is clear; ask rather than guess when uncertainty is material; and emit a thin ground handoff when the next consumer is vico-plan. Think before acting: prefer the minimum grounding move that resolves the highest-value uncertainty."
